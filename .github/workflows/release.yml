name: Build & Release

# Runs whenever you push a version tag like v1.2.0.
# It builds the macOS app and publishes a GitHub Release with the .dmg attached —
# which is exactly what Portside's "Check for updates" looks for.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # allow the workflow to create the release

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build macOS app (unsigned)
        run: npm run build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false   # personal app — skip Apple code signing

      - name: Publish GitHub Release with the built app
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            dist/*.dmg
            dist/*-mac.zip
          generate_release_notes: true
