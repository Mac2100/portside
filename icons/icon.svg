<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16283c"/>
      <stop offset="1" stop-color="#0a141f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </linearGradient>
    <!-- top container: teal -->
    <linearGradient id="t1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eead4"/><stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <!-- middle: cyan-blue -->
    <linearGradient id="t2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67e8f9"/><stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <!-- bottom: blue -->
    <linearGradient id="t3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/><stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- macOS squircle -->
  <rect x="100" y="100" width="824" height="824" rx="186" fill="url(#bg)"/>
  <rect x="100" y="100" width="824" height="824" rx="186" fill="url(#glow)"/>

  <!-- ===== bottom container (blue) ty=490 ===== -->
  <g>
    <polygon points="512,720 742,605 742,735 512,850" fill="#1d4ed8"/>
    <polygon points="282,605 512,720 512,850 282,735" fill="#2563eb"/>
    <polygon points="512,490 742,605 512,720 282,605" fill="url(#t3)"/>
  </g>

  <!-- ===== middle container (cyan) ty=360 ===== -->
  <g>
    <polygon points="512,590 742,475 742,605 512,720" fill="#0284c7"/>
    <polygon points="282,475 512,590 512,720 282,605" fill="#0ea5e9"/>
    <polygon points="512,360 742,475 512,590 282,475" fill="url(#t2)"/>
  </g>

  <!-- ===== top container (teal) ty=230 ===== -->
  <g>
    <polygon points="512,460 742,345 742,475 512,590" fill="#0d9488"/>
    <polygon points="282,345 512,460 512,590 282,475" fill="#14b8a6"/>
    <polygon points="512,230 742,345 512,460 282,345" fill="url(#t1)"/>
    <!-- top-face highlight -->
    <polygon points="512,230 742,345 512,460 282,345" fill="#ffffff" opacity="0.10"/>
  </g>
</svg>
